services:
  rae-hive:
    build: .
    container_name: rae-hive
    restart: unless-stopped
    command: python hive_engine.py
    ports:
      - "8005:8000" # MCP SSE Port
    environment:
      - RAE_PROJECT_NAME=dreamsoft_factory
      - RAE_API_URL=http://rae-api-dev:8000
      - PYTHONPATH=/app:/app/rae_libs
      - MCP_PORT=8000
    volumes:
      - .:/app
      - ../RAE-agentic-memory/rae-core/rae_core:/app/rae_libs/rae_core
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

networks:
  rae-internal:
    external: true
    name: rae-internal
